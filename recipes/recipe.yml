# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: os
description: OS

base-image: quay.io/fedora/fedora-silverblue
image-version: 44

modules:
  - type: signing@v1

  - type: script@v1
    snippets:
      - rpm --import "https://repos.fyralabs.com/terra${OS_VERSION}/key.asc"
      - dnf install --repofrompath="terra,https://repos.fyralabs.com/terra${OS_VERSION}" terra-release --assumeyes

  - type: dnf@v1
    repos:
      copr:
        - latin-1/os-packages
        - latin-1/os-packages-f44
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:latin-1:os-packages-f44
        packages:
          - kernel
          - kernel-core
          - kernel-modules
          - kernel-modules-core
          - kernel-modules-extra
    install:
      packages:
        - adobe-source-han-sans-fonts
        - adobe-source-han-sans-vf-fonts
        - adobe-source-han-serif-fonts
        - adobe-source-han-serif-vf-fonts
        - adobe-source-sans-pro-fonts
        - adobe-source-serif-pro-fonts
        - android-udev-rules
        - belleve-invis-iosevka-fonts
        - file-roller
        - google-noto-fonts-all
        - gstreamer1-plugin-openh264
        - ibus-rime
        - keyd
        - ntsync-autoload
        - openh264
        - steam-devices
        - sushi
    remove:
      packages:
        - fedora-bookmarks
        - fedora-chromium-config
        - fedora-chromium-config-gnome
        - fedora-flathub-remote
        - fedora-third-party
        - fedora-workstation-backgrounds
        - fedora-workstation-repositories
        - firefox
        - gnome-system-monitor

  - type: dnf@v1
    install:
      packages:
        - 7zip
        - android-tools
        - bat
        - eza
        - fastfetch
        - fd-find
        - fish
        - git-delta
        - git-extras
        - git-filter-repo
        - neovim
        - ripgrep
        - scrcpy
        - starship
        - tokei
        - typst
        - unar
        - wimlib-utils
        - yadm
        - yubikey-manager
        - zed-preview
    group-install:
      packages:
        - development-tools

  - type: script@v1
    snippets:
      - find /etc/skel -mindepth 1 -delete

  - type: files@v1
    files:
      - source: system
        destination: /

  - type: systemd@v1
    system:
      enabled:
        - keyd.service

  - type: gschema-overrides@v1

  - type: bling@v1
    install:
      - dconf-update-service

  - type: default-flatpaks@v2
    configurations:
      - scope: system
        install:
          - be.alexandervanhee.gradia
          - com.github.Matoking.protontricks
          - com.google.Chrome
          - com.usebottles.bottles
          - com.valvesoftware.Steam
          - com.vysp3r.ProtonPlus
          - io.github.nozwock.Packet
          - net.nokyan.Resources
          - org.gnome.Calculator
          - org.gnome.Characters
          - org.gnome.Extensions
          - org.gnome.Loupe
          - org.gnome.Papers
          - org.gnome.Showtime
          - org.gnome.Snapshot
          - org.gnome.TextEditor
          - rs.ruffle.Ruffle
        notify: false
      - scope: system
        repo:
          name: flathub-beta
          title: Flathub Beta
          url: https://dl.flathub.org/beta-repo/flathub-beta.flatpakrepo
        install:
          - com.valvesoftware.Steam
        notify: false
      - scope: system
        install:
          - org.freedesktop.Platform.VulkanLayer.gamescope//25.08
          - org.freedesktop.Platform.VulkanLayer.MangoHud//25.08
        notify: false
